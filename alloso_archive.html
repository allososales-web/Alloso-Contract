<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>알로소 견적·계약 아카이브</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f7f4ef;font-family:'Noto Sans KR',sans-serif;color:#1a1a1a;min-height:100vh;}
.nav{background:#1a1a1a;color:#fff;padding:0 24px;height:46px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.nav-brand{font-family:'Cormorant Garamond',serif;font-size:20px;letter-spacing:.22em;cursor:pointer;}
.nav-links{display:flex;gap:18px;align-items:center;}
.nav-links a{color:#9e9690;font-size:12px;text-decoration:none;letter-spacing:.05em;}
.nav-links a:hover{color:#fff;}
.nav-links a.active{color:#b8975a;font-weight:600;}
.wrap{max-width:960px;margin:0 auto;padding:32px 20px 100px;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:28px;letter-spacing:.15em;border-bottom:2px solid #1a1a1a;padding-bottom:14px;margin-bottom:28px;}
.tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid #e0dbd4;}
.tab{padding:10px 24px;font-family:inherit;font-size:13px;font-weight:600;background:none;border:none;cursor:pointer;color:#9e9690;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab.on{color:#1a1a1a;border-bottom-color:#1a1a1a;}
.search-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.search-bar input,.search-bar select{
  border:1px solid #e0dbd4;background:#fff;padding:9px 12px;font-family:inherit;font-size:13px;border-radius:2px;outline:none;
}
.search-bar input{flex:1;min-width:160px;}
.search-bar input:focus{border-color:#b8975a;}
.search-bar select{min-width:130px;}
.empty{text-align:center;padding:60px 20px;color:#9e9690;font-size:14px;}
.list{display:flex;flex-direction:column;gap:10px;}
.card{background:#fff;border:1px solid #e0dbd4;border-radius:3px;padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:border-color .15s;}
.card:hover{border-color:#b8975a;}
.card-no{font-size:11px;color:#9e9690;white-space:nowrap;min-width:90px;}
.card-main{flex:1;}
.card-name{font-size:15px;font-weight:600;margin-bottom:3px;}
.card-sub{font-size:12px;color:#9e9690;line-height:1.6;}
.card-amount{text-align:right;flex-shrink:0;}
.card-total{font-size:15px;font-weight:700;color:#b8975a;}
.card-date{font-size:11px;color:#9e9690;margin-top:2px;}
.card-actions{display:flex;gap:6px;flex-shrink:0;}
.btn{padding:7px 14px;font-family:inherit;font-size:12px;font-weight:600;border:none;cursor:pointer;border-radius:2px;white-space:nowrap;}
.btn-dark{background:#1a1a1a;color:#fff;}
.btn-dark:hover{background:#333;}
.btn-green{background:#4a7c59;color:#fff;}
.btn-green:hover{background:#3d6649;}
.btn-red{background:none;border:1px solid #e0dbd4;color:#c05050;font-size:11px;}
.btn-red:hover{border-color:#c05050;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.04em;}
.badge-quote{background:#e8f0e8;color:#4a7c59;}
.badge-contract{background:#e8e0f0;color:#5a3a8a;}
.store-tag{display:inline-block;padding:2px 8px;background:#f0ede8;border-radius:10px;font-size:11px;color:#6b5a3e;margin-left:4px;}

/* 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:999;align-items:center;justify-content:center;}
.modal-bg.on{display:flex;}
.modal{background:#fff;border-radius:4px;width:min(680px,95vw);max-height:90vh;overflow-y:auto;padding:28px 32px;}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-size:17px;font-weight:700;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#9e9690;}
.detail-row{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid #f0ede8;font-size:13px;}
.detail-lbl{width:110px;flex-shrink:0;color:#9e9690;}
.detail-val{flex:1;font-weight:500;}
.detail-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:12px;}
.detail-table th{background:#1a1a1a;color:#fff;padding:6px 8px;text-align:left;}
.detail-table td{border-bottom:1px solid #f0ede8;padding:6px 8px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid #e0dbd4;}

/* 전환율 테이블 */
.conv-wrap{margin-top:4px;}
.conv-summary{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
.conv-kpi{background:#fff;border:1px solid var(--border);border-radius:6px;padding:16px 22px;flex:1;min-width:140px;text-align:center;}
.conv-kpi-val{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--accent);}
.conv-kpi-lbl{font-size:11px;color:var(--text3);margin-top:4px;letter-spacing:.05em;}
.conv-tbl{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:6px;overflow:hidden;font-size:13px;}
.conv-tbl thead tr{background:var(--text);color:#fff;}
.conv-tbl th{padding:10px 14px;text-align:left;font-weight:500;font-size:12px;letter-spacing:.05em;}
.conv-tbl th.num{text-align:right;}
.conv-tbl td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.conv-tbl td.num{text-align:right;font-variant-numeric:tabular-nums;}
.conv-tbl tr:last-child td{border-bottom:none;}
.conv-tbl tr:hover td{background:#faf8f4;}
.conv-bar-wrap{background:#f0ede8;border-radius:100px;height:7px;width:120px;display:inline-block;vertical-align:middle;margin-left:8px;}
.conv-bar{background:var(--accent);border-radius:100px;height:7px;}
.conv-rate-high{color:#4a7c59;font-weight:700;}
.conv-rate-mid{color:var(--accent);font-weight:600;}
.conv-rate-low{color:#c05050;}

/* ── PIN 로그인 ── */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;}
#login-screen.hidden{display:none;}
.login-box{background:#fff;border:1px solid var(--border);border-radius:12px;padding:48px 40px;width:min(400px,90vw);text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.1);}
.login-logo{height:32px;margin-bottom:32px;mix-blend-mode:multiply;}
.login-title{font-family:'Cormorant Garamond',serif;font-size:22px;letter-spacing:.15em;margin-bottom:6px;}
.login-sub{font-size:12px;color:var(--text3);margin-bottom:28px;letter-spacing:.05em;}
.pin-input{width:100%;border:2px solid var(--border);border-radius:6px;padding:14px 16px;font-family:inherit;font-size:18px;font-weight:700;text-align:center;letter-spacing:.25em;outline:none;transition:border-color .15s;background:#fff;color:var(--text);}
.pin-input:focus{border-color:var(--accent);}
.pin-btn{width:100%;margin-top:14px;padding:13px;background:var(--text);color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:background .15s;}
.pin-btn:hover{background:#444;}
.pin-error{color:#c05050;font-size:12px;margin-top:10px;min-height:18px;}
/* 로그아웃 */
.session-badge{display:flex;align-items:center;gap:8px;margin-left:auto;}
.session-label{font-size:11px;color:var(--text3);background:var(--bg3);padding:4px 10px;border-radius:12px;letter-spacing:.05em;}
.logout-btn{background:none;border:1px solid var(--border);padding:4px 10px;font-family:inherit;font-size:11px;color:var(--text3);cursor:pointer;border-radius:4px;}
.logout-btn:hover{color:var(--text);border-color:var(--text);}

/* PIN 관리 */
.pin-section{margin-bottom:28px;}
.pin-section-title{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;padding:8px 0 10px;border-bottom:1px solid var(--border);margin-bottom:12px;}
.pin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
.pin-card{background:#fff;border:1px solid var(--border);border-radius:6px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.pin-card-label{font-size:13px;font-weight:600;color:var(--text);}
.pin-card-cat{font-size:11px;color:var(--text3);margin-top:2px;}
.pin-code{font-family:monospace;font-size:15px;font-weight:700;color:var(--accent);letter-spacing:.15em;background:var(--bg);padding:5px 12px;border-radius:4px;cursor:pointer;user-select:all;transition:background .15s;}
.pin-code:hover{background:var(--bg3);}
.pin-admin-card{background:var(--text);color:#fff;border-radius:8px;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.pin-admin-label{font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.12em;}
.pin-admin-code{font-family:monospace;font-size:18px;font-weight:700;letter-spacing:.2em;background:rgba(255,255,255,.15);padding:6px 16px;border-radius:4px;cursor:pointer;user-select:all;}

.pin-copy-toast.show{opacity:1;}

/* PIN 수정 */
.pin-card{position:relative;}
.pin-edit-wrap{display:flex;align-items:center;gap:6px;flex-direction:column;align-items:flex-end;}
.pin-code-row{display:flex;align-items:center;gap:6px;}
.pin-input-edit{font-family:monospace;font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.12em;
  background:var(--bg);border:1px solid var(--border);border-radius:4px;
  padding:4px 10px;width:90px;text-align:center;outline:none;display:none;}
.pin-input-edit:focus{border-color:var(--accent);}
.pin-edit-btn{font-size:10px;color:var(--text3);background:none;border:1px solid var(--border);
  border-radius:3px;padding:3px 8px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.pin-edit-btn:hover{border-color:var(--accent);color:var(--accent);}
.pin-save-btn{font-size:10px;color:#fff;background:var(--accent);border:none;
  border-radius:3px;padding:3px 8px;cursor:pointer;font-family:inherit;display:none;white-space:nowrap;}
.pin-admin-edit{display:flex;align-items:center;gap:8px;margin-top:8px;}
.pin-admin-input{font-family:monospace;font-size:14px;font-weight:700;letter-spacing:.15em;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;
  border-radius:4px;padding:5px 12px;width:120px;text-align:center;outline:none;display:none;}
.pin-admin-input:focus{border-color:#fff;}
.pin-admin-edit-btn{font-size:11px;color:rgba(255,255,255,.7);background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.3);border-radius:3px;padding:4px 10px;cursor:pointer;font-family:inherit;}
.pin-admin-edit-btn:hover{background:rgba(255,255,255,.2);}
.pin-admin-save-btn{font-size:11px;color:var(--text);background:#fff;border:none;
  border-radius:3px;padding:4px 10px;cursor:pointer;font-family:inherit;display:none;}
</style>

function loadPinMap() {
  // localStorage에 저장된 PIN 수정사항 병합
  try {
    var overrides = JSON.parse(localStorage.getItem('alloso_pin_overrides')||'{}');
    Object.keys(overrides).forEach(function(store) {
      // 해당 매장의 PIN 교체
      var oldPin = Object.keys(PIN_MAP).find(function(p){ return PIN_MAP[p].store === store; });
      if(oldPin && overrides[store] !== oldPin) {
        PIN_MAP[overrides[store]] = PIN_MAP[oldPin];
        delete PIN_MAP[oldPin];
      }
    });
    // 관리자 PIN 오버라이드
    if(overrides['__admin__']) {
      var oldAdmin = Object.keys(PIN_MAP).find(function(p){ return PIN_MAP[p].role==='admin'; });
      if(oldAdmin && overrides['__admin__'] !== oldAdmin) {
        PIN_MAP[overrides['__admin__']] = PIN_MAP[oldAdmin];
        delete PIN_MAP[oldAdmin];
      }
    }
  } catch(e){}
}
loadPinMap();

function getSession() {
  try {
    var s = JSON.parse(sessionStorage.getItem('alloso_session')||'null');
    // 당일 유효
    if(s && s.date === new Date().toISOString().slice(0,10)) return s;
  } catch(e){}
  return null;
}
function saveSession(pin) {
  var info = PIN_MAP[pin.toUpperCase()];
  if(!info) return false;
  var s = Object.assign({}, info, { date: new Date().toISOString().slice(0,10) });
  sessionStorage.setItem('alloso_session', JSON.stringify(s));
  currentSession = s;
  return true;
}

function fmt(n){ return Number(n||0).toLocaleString('ko-KR'); }

async function getData() {
  var colName = currentTab === 'quote' ? 'quotes' : 'contracts';
  var db = window.__db, getDocs = window.__getDocs, col = window.__collection;
  var qFn = window.__query, orderByFn = window.__orderBy;
  var all = [];
  if(db) {
    try {
      var snap = await getDocs(qFn(col(db, colName), orderByFn('savedAt','desc')));
      snap.forEach(function(d){ all.push(d.data()); });
    } catch(e) {
      // fallback localStorage
      try { all = JSON.parse(localStorage.getItem('alloso_'+colName)||'[]'); } catch(e2){}
    }
  } else {
    try { all = JSON.parse(localStorage.getItem('alloso_'+colName)||'[]'); } catch(e){}
  }
  if(currentSession && currentSession.role === 'store' && currentSession.store) {
    all = all.filter(function(d){
      return (d.storeName||d.store||'') === currentSession.store;
    });
  }
  return all;
}
async function getFilteredDataByTab(tab) {
  var colName = tab === 'quote' ? 'quotes' : 'contracts';
  var db = window.__db, getDocs = window.__getDocs, col = window.__collection;
  var qFn = window.__query, orderByFn = window.__orderBy;
  var all = [];
  if(db) {
    try {
      var snap = await getDocs(qFn(col(db, colName), orderByFn('savedAt','desc')));
      snap.forEach(function(d){ all.push(d.data()); });
    } catch(e) {
      try { all = JSON.parse(localStorage.getItem('alloso_'+colName)||'[]'); } catch(e2){}
    }
  } else {
    try { all = JSON.parse(localStorage.getItem('alloso_'+colName)||'[]'); } catch(e){}
  }
  if(currentSession && currentSession.role === 'store' && currentSession.store) {
    all = all.filter(function(d){ return (d.storeName||d.store||'') === currentSession.store; });
  }
  var fromD = document.getElementById('filter-date-from') ? document.getElementById('filter-date-from').value : '';
  var toD   = document.getElementById('filter-date-to')   ? document.getElementById('filter-date-to').value   : '';
  if(fromD) all = all.filter(function(x){ return (x.savedAt||x.date||'').slice(0,10) >= fromD; });
  if(toD)   all = all.filter(function(x){ return (x.savedAt||x.date||'').slice(0,10) <= toD; });
  return all;
}

  var storeCat = document.getElementById('filter-store-cat').value;
  var store = document.getElementById('filter-store').value;

  if(name) data = data.filter(function(d){ return (d.name||'').toLowerCase().includes(name); });
  if(storeCat) data = data.filter(function(d){ return (d.storeType||d.storeCat||'') === storeCat; });
  if(store) data = data.filter(function(d){ return (d.storeName||d.store||'') === store; });
  var fromD = document.getElementById('filter-date-from') ? document.getElementById('filter-date-from').value : '';
  var toD   = document.getElementById('filter-date-to')   ? document.getElementById('filter-date-to').value   : '';
  if(fromD) data = data.filter(function(d){ return (d.savedAt||d.date||'') >= fromD; });
  if(toD)   data = data.filter(function(d){ return (d.savedAt||d.date||'').slice(0,10) <= toD; });

  var el = document.getElementById('list-area');
  if(!data.length){
    el.innerHTML = '<div class="empty">저장된 내역이 없습니다.</div>';

    el.appendChild(card);

}

    '<div class="detail-row"><div class="detail-lbl">날짜</div><div class="detail-val">'+escHtml(d.date||d.savedAt||'-')+'</div></div>'+
    '<div class="detail-row"><div class="detail-lbl">비고</div><div class="detail-val">'+escHtml(d.notes||'-')+'</div></div>'+

function goContract(i) {
  var data = getData();
  var d = data[i];
  if(!d) return;

  localStorage.setItem('alloso_quote', JSON.stringify(d));

function deleteItem(i) {
  if(!confirm('삭제하시겠습니까?')) return;
  var key = currentTab==='quote' ? 'alloso_quotes' : 'alloso_contracts';
  var data = getData();

}

function clearDates(){
  var f = document.getElementById('filter-date-from');
  var t = document.getElementById('filter-date-to');
  if(f) f.value = ''; if(t) t.value = '';

function getFilteredData(tab) {
  var key = tab === 'quote' ? 'alloso_quotes' : 'alloso_contracts';
  try { var d = JSON.parse(localStorage.getItem(key)||'[]'); } catch(e){ var d = []; }
  var fromD = document.getElementById('filter-date-from') ? document.getElementById('filter-date-from').value : '';
  var toD   = document.getElementById('filter-date-to')   ? document.getElementById('filter-date-to').value   : '';
  if(fromD) d = d.filter(function(x){ return (x.savedAt||x.date||'').slice(0,10) >= fromD; });
  if(toD)   d = d.filter(function(x){ return (x.savedAt||x.date||'').slice(0,10) <= toD; });
  return d;
}

async function renderConversion() {
  var quotes    = await getFilteredDataByTab('quote');
  var contracts = await getFilteredDataByTab('contract');

  // 매장별 집계
  var storeMap = {};
  quotes.forEach(function(q) {
    var s = q.storeName || q.store || '미지정';
    if(!storeMap[s]) storeMap[s] = {cat: q.storeType||q.storeCat||'', quotes:0, contracts:0, amount:0};
    storeMap[s].quotes++;
  });
  contracts.forEach(function(c) {
    var s = c.storeName || c.store || '미지정';
    if(!storeMap[s]) storeMap[s] = {cat: c.storeType||c.storeCat||'', quotes:0, contracts:0, amount:0};
    storeMap[s].contracts++;
    storeMap[s].amount += (c.total||0);
  });

  var rows = Object.keys(storeMap).map(function(s) {
    var m = storeMap[s];
    var rate = m.quotes > 0 ? Math.round(m.contracts / m.quotes * 100) : 0;
    return {store:s, cat:m.cat, quotes:m.quotes, contracts:m.contracts, rate:rate, amount:m.amount};
  }).sort(function(a,b){ return b.rate - a.rate || b.quotes - a.quotes; });

  var totalQ = quotes.length, totalC = contracts.length;
  var totalRate = totalQ > 0 ? Math.round(totalC/totalQ*100) : 0;
  var totalAmt  = contracts.reduce(function(s,c){ return s+(c.total||0); }, 0);

  var rateClass = function(r){ return r>=60?'conv-rate-high':r>=30?'conv-rate-mid':'conv-rate-low'; };

  var tblRows = rows.map(function(r) {
    return '<tr>'+
      '<td>'+esc(r.store)+'</td>'+
      '<td><span class="store-tag">'+esc(r.cat)+'</span></td>'+
      '<td class="num">'+r.quotes+'</td>'+
      '<td class="num">'+r.contracts+'</td>'+
      '<td class="num">'+
        '<span class="'+rateClass(r.rate)+'">'+r.rate+'%</span>'+
        '<span class="conv-bar-wrap"><span class="conv-bar" style="width:'+Math.min(r.rate,100)+'%"></span></span>'+
      '</td>'+
      '<td class="num">'+fmt(r.amount)+'원</td>'+
    '</tr>';
  }).join('');

  document.getElementById('conversion-area').innerHTML =
    '<div class="conv-wrap">'+
    '<div class="conv-summary">'+
      '<div class="conv-kpi"><div class="conv-kpi-val">'+totalQ+'</div><div class="conv-kpi-lbl">총 견적서</div></div>'+

function renderPinMap() {
  var groups = {};
  Object.keys(PIN_MAP).forEach(function(pin) {
    var info = PIN_MAP[pin];
    if(info.role === 'admin') return;
    var cat = '기타';
    Object.keys(STORES).forEach(function(c) {
      STORES[c].forEach(function(s) { if(s.name === info.store) cat = c; });
    });
    if(!groups[cat]) groups[cat] = [];
    groups[cat].push({ pin: pin, label: info.label, store: info.store, cat: cat });
  });

  var adminPin = Object.keys(PIN_MAP).find(function(p){ return PIN_MAP[p].role==='admin'; }) || '';

  // 관리자 카드 (수정 가능)
  var adminHTML =
    '<div class="pin-admin-card">' +
      '<div>' +
        '<div class="pin-admin-label">👑 관리자</div>' +
        '<div style="font-size:11px;opacity:.6;margin-top:3px;">전 매장 조회 · 전환율 분석 · PIN 관리</div>' +
        '<div class="pin-admin-edit">' +
          '<div class="pin-admin-code" id="admin-pin-display" data-pin="'+adminPin+'" onclick="copyPin(this,this.dataset.pin)" title="클릭하여 복사">'+adminPin+'</div>' +
          '<input class="pin-admin-input" id="admin-pin-input" maxlength="10" placeholder="새 PIN">' +
          '<button class="pin-admin-edit-btn" id="admin-edit-btn" onclick="toggleAdminEdit()">수정</button>' +
          '<button class="pin-admin-save-btn" id="admin-save-btn" onclick="saveAdminPin()">저장</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  var catOrder = ['로드','스타필드','백화점','몰','기타'];
  var groupsHTML = catOrder.filter(function(c){ return groups[c] && groups[c].length; }).map(function(cat) {
    var cards = groups[cat].map(function(item) {
      var sid = 'store-' + item.store.replace(/\s/g,'_');
      return '<div class="pin-card">' +
        '<div><div class="pin-card-label">'+esc(item.label)+'</div>' +
        '<div class="pin-card-cat">'+esc(cat)+'</div></div>' +
        '<div class="pin-edit-wrap">' +
          '<div class="pin-code-row">' +
            '<div class="pin-code" id="'+sid+'-display" data-pin="'+item.pin+'" onclick="copyPin(this,this.dataset.pin)" title="클릭하여 복사">'+item.pin+'</div>' +
            '<input class="pin-input-edit" id="'+sid+'-input" data-store="'+esc(item.store)+'" maxlength="10" placeholder="새 PIN">' +
          '</div>' +
          '<div style="display:flex;gap:4px;">' +
            '<button class="pin-edit-btn" id="'+sid+'-edit" data-sid="'+sid+'" onclick="toggleEdit(this.dataset.sid)">수정</button>' +
            '<button class="pin-save-btn" id="'+sid+'-save" data-sid="'+sid+'" data-store="'+esc(item.store)+'" onclick="savePin(this.dataset.sid,this.dataset.store)">저장</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
    return '<div class="pin-section"><div class="pin-section-title">'+esc(cat)+'</div>' +
           '<div class="pin-grid">'+cards+'</div></div>';
  }).join('');

  document.getElementById('pinmap-area').innerHTML =
    '<div style="max-width:800px;">'+adminHTML+groupsHTML+'</div>' +
    '<div class="pin-copy-toast" id="pin-copy-toast">클립보드에 복사됐습니다</div>';
}

function toggleEdit(sid) {
  var display = document.getElementById(sid+'-display');
  var input   = document.getElementById(sid+'-input');
  var editBtn = document.getElementById(sid+'-edit');
  var saveBtn = document.getElementById(sid+'-save');
  if(input.style.display === 'block') {
    input.style.display = 'none'; display.style.display = '';
    editBtn.style.display = ''; saveBtn.style.display = 'none';
  } else {
    input.value = display.dataset.pin;
    input.style.display = 'block'; display.style.display = 'none';
    editBtn.style.display = 'none'; saveBtn.style.display = 'block';
    input.focus(); input.select();
  }
}

function savePin(sid, store) {
  var input = document.getElementById(sid+'-input');
  var display = document.getElementById(sid+'-display');
  var newPin = input.value.trim().toUpperCase();
  if(!newPin || newPin.length < 4) { alert('PIN은 4자리 이상이어야 합니다.'); return; }
  // 중복 체크
  if(PIN_MAP[newPin] && display.dataset.pin !== newPin) { alert('이미 사용 중인 PIN입니다.'); return; }

  var oldPin = display.dataset.pin;
  PIN_MAP[newPin] = PIN_MAP[oldPin];
  if(oldPin !== newPin) delete PIN_MAP[oldPin];

  // localStorage에 저장
  try {
    var ov = JSON.parse(localStorage.getItem('alloso_pin_overrides')||'{}');
    ov[store] = newPin;
    localStorage.setItem('alloso_pin_overrides', JSON.stringify(ov));
  } catch(e){}

  showPinToast(store + ' PIN이 ' + newPin + '으로 변경됐습니다');
  renderPinMap();
}

function toggleAdminEdit() {
  var display = document.getElementById('admin-pin-display');
  var input   = document.getElementById('admin-pin-input');
  var editBtn = document.getElementById('admin-edit-btn');
  var saveBtn = document.getElementById('admin-save-btn');
  input.value = display.dataset.pin;
  input.style.display = 'block'; display.style.display = 'none';
  editBtn.style.display = 'none'; saveBtn.style.display = 'inline-block';
  input.focus(); input.select();
}

function saveAdminPin() {
  var input   = document.getElementById('admin-pin-input');
  var display = document.getElementById('admin-pin-display');
  var newPin  = input.value.trim().toUpperCase();
  if(!newPin || newPin.length < 4) { alert('PIN은 4자리 이상이어야 합니다.'); return; }
  if(PIN_MAP[newPin] && display.dataset.pin !== newPin) { alert('이미 사용 중인 PIN입니다.'); return; }

  var oldPin = display.dataset.pin;
  PIN_MAP[newPin] = PIN_MAP[oldPin];
  if(oldPin !== newPin) delete PIN_MAP[oldPin];

  try {
    var ov = JSON.parse(localStorage.getItem('alloso_pin_overrides')||'{}');
    ov['__admin__'] = newPin;
    localStorage.setItem('alloso_pin_overrides', JSON.stringify(ov));
  } catch(e){}

  // 세션도 갱신
  if(currentSession) {
    currentSession.pin = newPin;
    sessionStorage.setItem('alloso_session', JSON.stringify(currentSession));
  }
  showPinToast('관리자 PIN이 ' + newPin + '으로 변경됐습니다');
  renderPinMap();
}

function showPinToast(msg) {
  var t = document.getElementById('pin-copy-toast');
  if(!t) return;
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}


function copyPin(el, pin) {
  navigator.clipboard.writeText(pin).catch(function(){
    var ta = document.createElement('textarea');
    ta.value = pin; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  });
  var toast = document.getElementById('pin-copy-toast');
  if(toast){ toast.classList.add('show'); setTimeout(function(){ toast.classList.remove('show'); }, 1800); }
}
async function exportExcel(){
  var data = await getData();
  // 날짜·이름·매장 필터 적용된 현재 목록 그대로
  var name  = document.getElementById('search-name').value.trim().toLowerCase();
  var scat  = document.getElementById('filter-store-cat').value;
  var store = document.getElementById('filter-store').value;
  var fromD = document.getElementById('filter-date-from').value;
  var toD   = document.getElementById('filter-date-to').value;
  if(name)  data = data.filter(function(d){ return (d.name||'').toLowerCase().includes(name); });
  if(scat)  data = data.filter(function(d){ return (d.storeType||d.storeCat||'') === scat; });
  if(store) data = data.filter(function(d){ return (d.storeName||d.store||'') === store; });
  if(fromD) data = data.filter(function(d){ return (d.savedAt||d.date||'') >= fromD; });
  if(toD)   data = data.filter(function(d){ return (d.savedAt||d.date||'').slice(0,10) <= toD; });

  if(!data.length){ alert('내보낼 데이터가 없습니다.'); return; }

  var isQ = currentTab === 'quote';
  var rows = [];

  // 헤더
  if(isQ){
    rows.push(['견적번호','저장일','고객명','연락처','주소','채널','매장','컨설턴트','견적일',
               '상품명','색상','수량','정가','정가합계','할인금액','할인율(%)','최종금액(VAT포함)','비고']);
  } else {
    rows.push(['계약번호','견적번호','저장일','고객명','연락처','주소','채널','매장','컨설턴트',
               '주문일자','시공예정일','상품명','색상','수량','정가','정가합계','할인금액','할인율(%)','최종금액(VAT포함)','비고']);
  }

  data.forEach(function(d){
    var addr = (d.addr||'') + (d.addrDetail?' '+d.addrDetail:'');
    var savedDate = (d.savedAt||'').slice(0,10);
    var productSummary = (d.rows||[]).map(function(r){
      return r.name + (r.color?' ('+r.color+')':'') + (r.qty>1?' ×'+r.qty:'');
    }).join('\n');
    var qtySum = (d.rows||[]).reduce(function(s,r){ return s+(r.qty||1); }, 0);

    if(isQ){
      rows.push([
        d.quoteNo||'', savedDate, d.name||'', d.phone||'', addr,
        d.storeType||d.storeCat||'', d.storeName||d.store||'', d.manager||d.consultant||'',
        d.date||'', productSummary, '', qtySum,
        d.retail||0, d.retail||0, d.discount||0,
        d.discPct||Math.round((d.discount||0)/(d.retail||1)*100),
        d.total||0, d.notes||''
      ]);
    } else {
      rows.push([
        d.contractNo||'', d.quoteNo||'', savedDate, d.name||'', d.phone||'', addr,
        d.storeType||d.storeCat||'', d.storeName||d.store||'', d.manager||d.consultant||'',
        d.date||'', d.installDate||'', productSummary, '', qtySum,
        d.retail||0, d.retail||0, d.discount||0,
        d.discPct||Math.round((d.discount||0)/(d.retail||1)*100),
        d.total||0, d.notes||''
      ]);
    }
  });

  // CSV → BOM 포함 UTF-8 (엑셀 한글 깨짐 방지)
  var csv = rows.map(function(row){
    return row.map(function(cell){
      var s = String(cell==null?'':cell).replace(/"/g,'""');
      if(s.indexOf(',')>=0 || s.indexOf('"')>=0 || s.indexOf('\n')>=0) s = '"'+s+'"';
      return s;
    }).join(',');
  }).join('\n');

  var BOM = '\uFEFF';
  var blob = new Blob([BOM+csv], {type:'text/csv;charset=utf-8;'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  var today= new Date().toISOString().slice(0,10).replace(/-/g,'');
  a.href = url;
  a.download = '알로소_'+(isQ?'견적':'계약')+'_'+today+'.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);

  // 전환율 시트도 함께 다운로드
  setTimeout(async function(){
    var qAll = await getFilteredDataByTab('quote');
    var cAll = await getFilteredDataByTab('contract');
    var sm = {};
    qAll.forEach(function(q){ var s=q.storeName||q.store||'미지정'; if(!sm[s]) sm[s]={cat:q.storeType||q.storeCat||'',q:0,c:0,amt:0}; sm[s].q++; });
    cAll.forEach(function(c){ var s=c.storeName||c.store||'미지정'; if(!sm[s]) sm[s]={cat:c.storeType||c.storeCat||'',q:0,c:0,amt:0}; sm[s].c++; sm[s].amt+=(c.total||0); });
    var convRows = [['매장','채널','견적건수','계약건수','전환율(%)','계약금액합계']];
    Object.keys(sm).sort().forEach(function(s){
      var m=sm[s], rate=m.q>0?Math.round(m.c/m.q*100):0;
      convRows.push([s, m.cat, m.q, m.c, rate, m.amt]);
    });
    var tQ=qAll.length, tC=cAll.length;
    convRows.push(['','','','','','']);
    convRows.push(['전체합계','',tQ,tC,tQ>0?Math.round(tC/tQ*100):0, cAll.reduce(function(s,c){return s+(c.total||0);},0)]);
    var csv2 = convRows.map(function(row){
      return row.map(function(cell){
        var s=String(cell==null?'':cell).replace(/"/g,'""');
        if(s.indexOf(',')>=0||s.indexOf('"')>=0) s='"'+s+'"';
        return s;
      }).join(',');
    }).join('\n');
    var blob2=new Blob(['\uFEFF'+csv2],{type:'text/csv;charset=utf-8;'});
    var url2=URL.createObjectURL(blob2);
    var a2=document.createElement('a');
    a2.href=url2; a2.download='알로소_전환율_'+today+'.csv';
    document.body.appendChild(a2); a2.click();
    document.body.removeChild(a2); URL.revokeObjectURL(url2);
  }, 300);
}

function submitPin() {
  var pin = document.getElementById('pin-input').value.trim().toUpperCase();
  var errEl = document.getElementById('pin-error');
  if(!pin){ errEl.textContent = '코드를 입력해주세요.'; return; }
  if(saveSession(pin)) {
    errEl.textContent = '';
    showApp();
  } else {
    errEl.textContent = '올바르지 않은 코드입니다.';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-input').focus();
  }
}

function showLogin() {
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-input').focus();
}

function showApp() {
  document.getElementById('login-screen').classList.add('hidden');
  // 세션 배지
  var lbl = document.getElementById('session-label');
  if(lbl) lbl.textContent = currentSession.label;
  // 매장 필터 - store 역할이면 숨김
  var isAdmin = currentSession.role === 'admin';
  var catEl = document.getElementById('filter-store-cat');
  var storeEl = document.getElementById('filter-store');
  if(!isAdmin) {
    if(catEl) catEl.closest('.search-bar') && (catEl.style.display='none');
    if(storeEl) storeEl.style.display='none';
    if(catEl) catEl.style.display='none';
  }
  // 전환율 탭 - 관리자만
  var convTab = document.getElementById('tab-conversion');
  if(convTab) convTab.style.display = isAdmin ? '' : 'none';
  var pinTab = document.getElementById('tab-pinmap');
  if(pinTab) pinTab.style.display = isAdmin ? '' : 'none';

  // 채널 드롭다운 초기화
  initStoreFilter();
  renderList();
}

function initStoreFilter() {
  var catSel = document.getElementById('filter-store-cat');
  if(!catSel || catSel.options.length > 1) return;
  Object.keys(STORES).forEach(function(cat){
    var o=document.createElement('option'); o.value=cat; o.textContent=cat; catSel.appendChild(o);
  });
}

// ── 앱 시작 ──
currentSession = getSession();
if(currentSession) {
  showApp();
} else {
  document.getElementById('login-screen').classList.remove('hidden');

}
