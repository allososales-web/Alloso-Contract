<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f7f4ef;font-family:'Noto Sans KR',sans-serif;color:#1a1a1a;}
.nav{background:#1a1a1a;color:#fff;padding:0 24px;height:46px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-brand{cursor:pointer;display:flex;align-items:center;}
.nav-steps{display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.07em;}
.done{color:#b8975a;}.cur{color:#fff;font-weight:700;}.next{color:#555;}.sep{color:#444;font-size:9px;}
.wrap{max-width:860px;margin:0 auto;padding:32px 20px 100px;}
.doc-hdr{display:flex;justify-content:space-between;align-items:flex-start;border-top:4px solid #1a1a1a;padding-top:22px;margin-bottom:32px;}
.brand{font-family:'Cormorant Garamond',serif;font-size:28px;letter-spacing:.22em;}
.brand-sub{font-size:10px;color:#9e9690;letter-spacing:.12em;margin-top:3px;}
.doc-title{font-family:'Noto Serif KR',serif;font-size:26px;font-weight:600;letter-spacing:.12em;text-align:right;}
.doc-meta{font-size:11px;color:#9e9690;text-align:right;margin-top:5px;line-height:1.8;}
.sec{margin-bottom:28px;}
.sec-label{font-size:10px;font-weight:700;letter-spacing:.14em;color:#9e9690;text-transform:uppercase;border-bottom:1px solid #e0dbd4;padding-bottom:7px;margin-bottom:14px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field.full{grid-column:1/-1;min-width:0;}
.field label{font-size:11px;color:#9e9690;}
.field input,.field textarea,.field select{border:1px solid #e0dbd4;background:#fff;padding:8px 10px;font-family:inherit;font-size:13px;border-radius:2px;outline:none;width:100%;}
.field input:focus,.field select:focus{border-color:#b8975a;}
.field input[readonly]{background:#f0ede8;color:#9e9690;}
.store-row{display:flex;gap:8px;}
.store-row select{flex:1;}
.addr-row{display:flex;gap:7px;align-items:stretch;margin-bottom:6px;width:100%;box-sizing:border-box;}
.addr-pc{width:90px;min-width:0;flex-shrink:0;}
.addr-btn{padding:0 14px;background:#1a1a1a;color:#fff;border:none;font-family:inherit;font-size:12px;cursor:pointer;border-radius:2px;white-space:nowrap;flex-shrink:0;}
.addr-main{flex:1;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
thead th{background:#1a1a1a;color:#fff;padding:8px 9px;text-align:left;font-weight:500;font-size:11px;white-space:nowrap;}
.tc{text-align:center;}.tr{text-align:right;}
tbody td{border-bottom:1px solid #e8e3dc;padding:6px 7px;vertical-align:middle;}
tbody td input{border:none;background:transparent;font-family:inherit;font-size:12.5px;width:100%;outline:none;}
.del-btn{background:none;border:none;color:#c8c0b8;cursor:pointer;font-size:17px;padding:0;line-height:1;}
.del-btn:hover{color:#e07070;}
.add-btn{margin-top:9px;background:none;border:1px dashed #d0cbc4;color:#9e9690;font-family:inherit;font-size:12px;padding:6px 16px;cursor:pointer;border-radius:2px;}
.summary{background:#fff;border:1px solid #e0dbd4;border-radius:3px;padding:18px 22px;}
.sum-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;}
.sum-row .lbl{color:#9e9690;}
.sum-total{border-top:1px solid #e0dbd4;margin-top:9px;padding-top:13px;font-size:15px;font-weight:700;}
.sum-total .val{color:#b8975a;font-size:17px;}
.disc-val{color:#c05050;}
.actions{display:flex;gap:10px;justify-content:flex-end;margin-top:32px;padding-top:22px;border-top:1px solid #e0dbd4;}
.btn{padding:11px 26px;font-family:inherit;font-size:13px;font-weight:600;letter-spacing:.06em;border:none;cursor:pointer;border-radius:2px;}
.btn-sec{background:#eae6e0;color:#4a4641;}
.btn-pri{background:#1a1a1a;color:#fff;}
.btn-outline{background:#fff;color:#1a1a1a;border:1px solid #1a1a1a;}
/* 주소레이어 */
#addr-layer{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.65);align-items:center;justify-content:center;}
#addr-layer.on{display:flex;}
#addr-box{width:min(560px,96vw);height:min(520px,84vh);background:#fff;border-radius:4px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4);}
#addr-hdr{background:#1a1a1a;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
#addr-hdr span{color:#fff;font-size:13px;}
#addr-hdr button{background:none;border:none;color:#888;font-size:22px;cursor:pointer;}
#addr-embed{flex:1;min-height:0;width:100%;}
.nav-links{display:flex;gap:18px;align-items:center;}
.nav-links a{color:#9e9690;font-size:12px;text-decoration:none;letter-spacing:.08em;}
.nav-links a:hover{color:#fff;}
.nav-links a.active{color:#fff;font-weight:600;}

.postcode-row{display:flex;gap:8px;align-items:center;}
.postcode-input{width:130px !important;flex-shrink:0;background:var(--bg2);font-weight:700;letter-spacing:.08em;text-align:center;cursor:default;}
.postcode-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:#1a1a1a;color:#fff;border:none;border-radius:4px;font-family:inherit;font-size:13px;font-weight:500;letter-spacing:.04em;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.postcode-btn:hover{background:#333;}
</style>

        <input id="f-addr-detail" type="text" placeholder="상세 주소 (동·호수 등)">
      </div>
      <div class="field">
        <label>매장</label>
        <div class="store-row">
          <select id="f-store-type" onchange="updateStoreList()">
            <option value="">유형 선택</option>
            <option value="로드">로드</option>
            <option value="백화점">백화점</option>
            <option value="몰">몰</option>
          </select>
          <select id="f-store-name">
            <option value="">매장 선택</option>
          </select>
        </div>
      </div>
      <div class="field"><label>담당 컨설턴트</label><input id="f-manager" type="text" placeholder="컨설턴트 이름"></div>
      <div class="field"><label>견적일</label><input id="f-date" type="date"></div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-label">품목 내역</div>
    <div style="overflow-x:auto;">
      <table>
        <thead><tr>
          <th class="tc" style="width:30px">No</th>
          <th style="width:75px">시리즈</th>
          <th style="width:50px">사양</th>
          <th style="min-width:100px">색상</th>
          <th style="width:150px">규격</th>
          <th class="tr" style="width:44px">수량</th>
          <th class="tr" style="width:50px">할인%</th>
          <th class="tr" style="width:100px">정가 (VAT포함)</th>
          <th class="tr" style="width:110px">금액 (VAT포함)</th>
          <th style="width:28px"></th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <button class="add-btn" onclick="addRow()">+ 품목 추가</button>
  </div>

  <div class="sec">
    <div class="sec-label">견적 금액 (VAT 포함)</div>
    <div class="summary">
      <div class="sum-row"><span class="lbl">정가 합계</span><span id="s-retail">0원</span></div>
      <div class="sum-row"><span class="lbl">할인 금액 <span id="s-disc-pct" style="font-size:11px;color:#c05050;"></span></span><span id="s-disc" class="disc-val">-0원</span></div>
      <div class="sum-row sum-total">
        <span class="lbl">최종 견적 금액 <small style="font-weight:400;font-size:11px">(VAT 포함)</small></span>
        <span id="s-total" class="val">0원</span>
      </div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-label">비고</div>
    <div class="field"><textarea id="f-notes" rows="3" placeholder="특이사항, 배송 조건 등" style="resize:vertical;"></textarea></div>
  </div>
</div>

<div class="actions" style="max-width:860px;margin:0 auto;padding:0 20px 40px;">
  <button class="btn btn-sec" onclick="history.back()">← 가격표</button>
  <button class="btn btn-outline" onclick="savePDF()">PDF 저장</button>
  <button class="btn btn-outline" onclick="saveQuote()">견적 저장</button>
  <button class="btn btn-pri" onclick="toContract()">계약서 작성하기 →</button>
</div>

<!-- 주소검색 레이어 -->
<div id="addr-layer">
  <div id="addr-box">
    <div id="addr-hdr"><span>주소 검색</span><button onclick="closeAddr()">✕</button></div>
    <div id="addr-embed"></div>
  </div>
</div>

<script>
var rows = [];
var quoteNo = '';

var STORES = {
  '로드': [
    {name:'청담', code:'CD'}, {name:'기흥', code:'GH'}, {name:'대구', code:'DG'},
    {name:'대전', code:'DJ'}, {name:'노원', code:'NW'}, {name:'성수', code:'SS'}
  ],
  '스타필드': [
    {name:'고양 스타필드', code:'GY'}, {name:'수원 스타필드', code:'SW'}, {name:'하남 스타필드', code:'HN'}
  ],
  '백화점': [
    {name:'아이파크', code:'IP'}, {name:'신세계 영등포', code:'SE'}, {name:'신세계 센텀', code:'SC'},
    {name:'신세계 의정부', code:'SI'}, {name:'신세계 김해', code:'SK'},
    {name:'롯데 노원', code:'LN'}, {name:'롯데 동탄', code:'LD'}, {name:'롯데 구리', code:'LG'},
    {name:'롯데 울산', code:'LU'}, {name:'갤러리아 대전', code:'GD'}, {name:'더현대 대구', code:'HD'}
  ],
  '몰': [
    {name:'메종 동부산', code:'MB'}
  ]
};

function buildStoreDropdown(catId, storeId) {
  var catSel = document.getElementById(catId);
  var storeSel = document.getElementById(storeId);
  if(!catSel) return;
  Object.keys(STORES).forEach(function(cat) {
    var o = document.createElement('option'); o.value = cat; o.textContent = cat; catSel.appendChild(o);
  });
  catSel.addEventListener('change', function() {
    storeSel.innerHTML = '<option value="">매장 선택</option>';
    (STORES[this.value]||[]).forEach(function(s) {
      var o = document.createElement('option'); o.value = s.code; o.textContent = s.name; storeSel.appendChild(o);
    });
  });
}
function getStoreCode(catId, storeId) {
  var el = document.getElementById(storeId); return el ? el.value : '';
}
function getStoreName(catId, storeId) {
  var sel = document.getElementById(storeId);
  return (sel && sel.selectedIndex > 0) ? sel.options[sel.selectedIndex].textContent : '';
}

window.onload = function() {
  var today = new Date();
  document.getElementById('f-date').value = today.toISOString().slice(0,10);
  quoteNo = 'Q' + today.toISOString().slice(0,10).replace(/-/g,'') + '-' + (getStoreCode('f-store-cat','f-store')||'XX') + '-' + (Math.floor(Math.random()*900)+100);
  document.getElementById('meta').innerHTML = '견적번호 '+quoteNo+'<br>'+today.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});

  // 저장된 견적 불러오기 (수정 모드)
  var editing = null;
  try { editing = JSON.parse(sessionStorage.getItem('alloso_edit_quote')); sessionStorage.removeItem('alloso_edit_quote'); } catch(e){}
  if (editing) {
    loadQuoteData(editing);
  } else {
    try {
      var saved = localStorage.getItem('alloso_cart');
      if (saved) {
        var cart = JSON.parse(saved);
        rows = cart.map(function(item){
          var disc = item.origPrice ? Math.round((1-(item.salePrice||item.origPrice)/item.origPrice)*100) : 0;
          var fullName = item.name || '';
          var series = item.series || '';
          // 사양: series 제거 후 _ 앞 부분 (예: "레지나 3인_에센셜..." → "3인")
          var withoutSeries = fullName.startsWith(series) ? fullName.slice(series.length).trim() : fullName;
          var spec = withoutSeries.split('_')[0].trim();
          // 색상: _ 뒤 아티클 + color (예: "에센셜 패브릭ㅣ노르딕 - 멜로우크림")
          var articlePart = withoutSeries.includes('_') ? withoutSeries.split('_').slice(1).join('_').trim() : '';
          var colorVal = item.color || '';
          var colorFull = articlePart && colorVal ? articlePart + ' - ' + colorVal : (articlePart || colorVal);
          return {series:series, spec:spec, color:colorFull, spec2:item.spec||'', code:item.code||'', qty:item.qty||1, disc:disc, origPrice:item.origPrice||0};
        });
      }
    } catch(e){}
  }
  render();
};

function loadQuoteData(q) {
  quoteNo = q.quoteNo || quoteNo;
  document.getElementById('meta').innerHTML = '견적번호 '+quoteNo+'<br>'+(new Date()).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
  function sv(id,v){ var e=document.getElementById(id); if(e&&v!=null) e.value=v; }
  sv('f-name',q.name); sv('f-phone',q.phone);
  sv('f-pc',q.pc); sv('f-addr',q.addr); sv('f-addr-detail',q.addrDetail);
  sv('f-manager',q.manager); sv('f-date',q.date); sv('f-notes',q.notes);
  if (q.storeType) { sv('f-store-type',q.storeType); updateStoreList(); sv('f-store-name',q.storeName); }
  rows = q.rows || [];
}

function updateStoreList() {
  var type = document.getElementById('f-store-type').value;
  var sel  = document.getElementById('f-store-name');
  sel.innerHTML = '<option value="">매장 선택</option>';
  if (type && STORES[type]) {
    STORES[type].forEach(function(s){ sel.innerHTML += '<option value="'+s+'">'+s+'</option>'; });
  }
}

/* ── 테이블 ── */
function fmt(n){return Number(n||0).toLocaleString('ko-KR');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
function lineAmt(r){return Math.round((r.origPrice||0)*(1-(r.disc||0)/100))*(r.qty||1);}

function render(){
  var tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  rows.forEach(function(r,i){
    var tr=document.createElement('tr');
    tr.innerHTML=
      '<td class="tc" style="color:#9e9690;font-size:12px;">'+(i+1)+'</td>'+
      '<td><input type="text" value="'+esc(r.series||'')+'" oninput="upd('+i+',\'series\',this.value)" style="width:100%"></td>'+
      '<td><input type="text" value="'+esc(r.spec||'')+'" oninput="upd('+i+',\'spec\',this.value)" style="width:100%"></td>'+
      '<td><input type="text" value="'+esc(r.color||'')+'" oninput="upd('+i+',\'color\',this.value)" style="width:100%"></td>'+
      '<td><input type="text" value="'+esc(r.spec2||'')+'" oninput="upd('+i+',\'spec2\',this.value)" style="width:100%"></td>'+
      '<td><input type="number" value="'+(r.qty||1)+'" min="1" style="text-align:right;width:44px;" oninput="upd('+i+',\'qty\',+this.value||1)"></td>'+
      '<td><input type="number" value="'+(r.disc||0)+'" min="0" max="100" style="text-align:right;width:44px;" oninput="upd('+i+',\'disc\',+this.value||0)"></td>'+
      '<td class="tr" style="color:#9e9690;" id="op'+i+'">'+fmt(r.origPrice)+'</td>'+
      '<td class="tr" style="font-weight:500;" id="lt'+i+'">'+fmt(lineAmt(r))+'원</td>'+
      '<td><button class="del-btn" onclick="delRow('+i+')">×</button></td>';
    tbody.appendChild(tr);
  });
  recalc();
}
function upd(i,key,val){rows[i][key]=val;if(key==='qty'||key==='disc'){var el=document.getElementById('lt'+i);if(el)el.textContent=fmt(lineAmt(rows[i]))+'원';recalc();}}
function addRow(){rows.push({series:'',spec:'',color:'',spec2:'',qty:1,disc:0,origPrice:0});render();}
function delRow(i){rows.splice(i,1);render();}
function recalc(){
  var retail=0,total=0;
  rows.forEach(function(r){retail+=(r.origPrice||0)*(r.qty||1);total+=lineAmt(r);});
  var disc=retail-total;
  var pct=retail>0?Math.round(disc/retail*100):0;
  document.getElementById('s-retail').textContent=fmt(retail)+'원';
  document.getElementById('s-disc').textContent='-'+fmt(disc)+'원';
  document.getElementById('s-disc-pct').textContent=pct>0?'(-'+pct+'%)':'';
  document.getElementById('s-total').textContent=fmt(total)+'원';
  return {retail:retail,discount:disc,discPct:pct,total:total};
}

function getFormData(){
  var nums=recalc();
  return {
    quoteNo:quoteNo,
    name:document.getElementById('f-name').value.trim(),
    phone:document.getElementById('f-phone').value.trim(),
    pc:document.getElementById('f-pc').value,
    addr:document.getElementById('f-addr').value,
    addrDetail:document.getElementById('f-addr-detail').value,
    storeType:document.getElementById('f-store-type').value,
    storeName:getStoreName('f-store-cat','f-store'),
    manager:document.getElementById('f-manager').value,
    date:document.getElementById('f-date').value,
    notes:document.getElementById('f-notes').value,
    rows:rows,retail:nums.retail,discount:nums.discount,discPct:nums.discPct,total:nums.total,
    savedAt: new Date().toISOString()
  };
}

/* ── 견적 저장 (아카이브) ── */
function saveQuote(){
  var name=document.getElementById('f-name').value.trim();
  if(!name){alert('성명을 입력해 주세요');return;}
  var data=getFormData();
  // Firestore 저장
  var db=window.__db, col=window.__collection, addDoc=window.__addDoc, setDoc=window.__setDoc, docFn=window.__doc;
  if(db){
    data.savedAt = new Date().toISOString();
    setDoc(docFn(col(db,'quotes'), data.quoteNo), data)
      .then(function(){ alert('견적이 저장되었습니다.'); })
      .catch(function(e){ alert('저장 실패: '+e.message); });
  } else {
    // fallback
    try{
      var list=JSON.parse(localStorage.getItem('alloso_quotes')||'[]');
      var idx=list.findIndex(function(q){return q.quoteNo===data.quoteNo;});
      if(idx>=0) list[idx]=data; else list.unshift(data);
      localStorage.setItem('alloso_quotes',JSON.stringify(list));
      alert('견적이 저장되었습니다.(로컬)');
    }catch(e){alert('저장 실패: '+e.message);}
  }
}

/* ── PDF 저장 ── */
function savePDF(){
  var btn=document.querySelector('.actions');
  btn.style.display='none';
  html2canvas(document.getElementById('print-area'),{scale:2,useCORS:true}).then(function(canvas){
    btn.style.display='';
    var pdf=new jspdf.jsPDF('p','mm','a4');
    var w=pdf.internal.pageSize.getWidth();
    var h=canvas.height*w/canvas.width;
    pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,0,w,h);
    var name=document.getElementById('f-name').value||'견적서';
    pdf.save('알로소_견적서_'+name+'_'+quoteNo+'.pdf');
  });
}

/* ── 계약서로 ── */
function toContract(){
  var name=document.getElementById('f-name').value.trim();
  var phone=document.getElementById('f-phone').value.trim();
  if(!name){alert('성명을 입력해 주세요');return;}
  if(!phone){alert('연락처를 입력해 주세요');return;}
  if(!rows.length){alert('품목을 추가해 주세요');return;}
  localStorage.setItem('alloso_quote',JSON.stringify(getFormData()));
  window.location.href='alloso_contract.html';
}

/* ── 주소검색 ── */
function openAddr(){
  document.getElementById('addr-layer').classList.add('on');
  document.getElementById('addr-embed').innerHTML='';
  new daum.Postcode({
    oncomplete:function(data){
      document.getElementById('f-pc').value=data.zonecode;
      document.getElementById('f-addr').value=data.roadAddress||data.jibunAddress;
      document.getElementById('addr-layer').classList.remove('on');
      document.getElementById('f-addr-detail').value='';
      document.getElementById('f-addr-detail').focus();
    },
    width:'100%',height:'100%'
  }).embed(document.getElementById('addr-embed'));
}
function closeAddr(){document.getElementById('addr-layer').classList.remove('on');}
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('addr-layer').addEventListener('click',function(e){if(e.target===this)closeAddr();});
});
</script>
</body>
</html>
